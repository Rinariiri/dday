<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving Day Countdown</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Silkscreen&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fffafb;
  --border:#f1cfd9;
  --border-strong:#e8bcc9;
  --text:#8c868a;
  --muted:#c9aeb8;
  --shadow:0 6px 22px rgba(215,176,189,0.18);
}

*{box-sizing:border-box}

html, body{
  margin:0;
  padding:0;
  width:100%;
  background:transparent;
  overflow:hidden;
}

body{
  padding:10px;
  font-family:"Nunito", system-ui, sans-serif;
}

.widget{
  width:100%;
  max-width:340px;
  margin:0 auto;
  background:var(--bg);
  border:2px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:10px 12px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  min-height:44px;
}

.heart{
  color:#e7a8bb;
  font-size:13px;
  line-height:1;
  flex:0 0 auto;
}

.stack{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  line-height:1.05;
}

.count{
  font-family:'Silkscreen', monospace;
  color:#7d7d7d;
  font-size:15px;
  letter-spacing:1.6px;
  white-space:nowrap;
}

.label{
  margin-top:4px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  color:#b59aa4;
  text-transform:lowercase;
}
</style>
</head>

<body>

<div class="widget">
  <div class="row">
    <span class="heart">♥</span>

    <div class="stack">
      <span class="count" id="count"></span>
      <span class="label">moving day</span>
    </div>

    <span class="heart">♥</span>
  </div>
</div>

<script>
const targetDate = new Date("2026-07-14");

function updateCountdown(){
  const today = new Date();
  const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const end = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
  const diff = Math.round((end - start) / (1000 * 60 * 60 * 24));
  const el = document.getElementById("count");

  if(diff > 0){
    el.textContent = "D-" + diff;
  } else if(diff === 0){
    el.textContent = "D-DAY";
  } else {
    el.textContent = "D+" + Math.abs(diff);
  }
}

updateCountdown();
</script>

</body>
</html>
